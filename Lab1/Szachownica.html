<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szachownica Canvas</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            background-color: #e0e0e0;
            margin: 0;
        }
        canvas {
            border: 4px solid #333; 
            background-color: white;
        }
    </style>
</head>
<body>

    <canvas id="chessboard" width="400" height="400"></canvas>

    <script>
        function draw() {
            var canvas = document.getElementById("chessboard");
            var graphics = canvas.getContext("2d");
            var rows = 8;
            var cols = 8;
            
            var tileSize = canvas.width / cols;

            for (var row = 0; row < rows; row++) {
                for (var col = 0; col < cols; col++) {
                    
                    if ((row + col) % 2 === 0) {
                        graphics.fillStyle = "#F0D9B5";
                    } else {
                        graphics.fillStyle = "#B58863";
                    }
                    
                    graphics.fillRect(col * tileSize, row * tileSize, tileSize, tileSize);
                }
            }
        }

        window.onload = draw;
    </script>

</body>
</html>
