<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="600" viewBox="0 0 800 600">
    
    <defs>
        
        <g id="kolo-wariant12">
            <polygon points="40,0 34.6,20 20,34.6 0,40 -20,34.6 -34.6,20 -40,0 -34.6,-20 -20,-34.6 0,-40 20,-34.6 34.6,-20" fill="none" stroke="black" stroke-width="2" />
            
            <line x1="-40" y1="0" x2="40" y2="0" stroke="black" stroke-width="1"/>
            <line x1="-34.6" y1="-20" x2="34.6" y2="20" stroke="black" stroke-width="1"/>
            <line x1="-20" y1="-34.6" x2="20" y2="34.6" stroke="black" stroke-width="1"/>
            <line x1="0" y1="-40" x2="0" y2="40" stroke="black" stroke-width="1"/>
            <line x1="20" y1="-34.6" x2="-20" y2="34.6" stroke="black" stroke-width="1"/>
            <line x1="34.6" y1="-20" x2="-34.6" y2="20" stroke="black" stroke-width="1"/>

            <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="10s" repeatCount="indefinite" />
        </g>

        <g id="hustawka">
            <g transform="rotate(15)">
                <use xlink:href="#kolo-wariant12" x="-145" y="0" />
                <use xlink:href="#kolo-wariant12" x="145" y="0" />
                <rect x="-150" y="-10" width="300" height="20" fill="red" />
            </g>
            <polygon points="-25,180 25,180 0,2" />
        </g>
        
    </defs>

    <rect width="800" height="600" fill="#ffffff" />

    <use xlink:href="#hustawka" transform="translate(250, 250) scale(0.8)" fill="purple" />

    <use xlink:href="#hustawka" transform="translate(450, 400) scale(1.1)" fill="blue" />

    <use xlink:href="#hustawka" transform="translate(650, 150) scale(0.6)" fill="green" />

</svg>
